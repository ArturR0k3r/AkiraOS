# SPDX-License-Identifier: Apache-2.0

CONFIG_BOARD_AKIRA_CONSOLE=y
CONFIG_SOC_ESP32=y
CONFIG_SOC_SERIES_ESP32=y

# Enable console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable GPIO
CONFIG_GPIO=y

# Enable clock control
CONFIG_CLOCK_CONTROL=y

# Enable USB device
CONFIG_USB_DEVICE_STACK=y

# Enable flash
CONFIG_FLASH=y

# Enable WiFi
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NETWORKING=y

# Enable minimal libc
CONFIG_MINIMAL_LIBC=y

# Clock configuration
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=240000000

# Enable FPU
CONFIG_FPU=y