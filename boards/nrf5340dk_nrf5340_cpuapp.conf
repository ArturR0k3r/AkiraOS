CONFIG_WIFI=y
CONFIG_WIFI_ESP_AT=y
CONFIG_WIFI_ESP_AT_MDM_RX_BUF_COUNT=40
CONFIG_WIFI_ESP_AT_PASSIVE_MODE=y
CONFIG_WIFI_ESP_AT_IP_DHCP=y
CONFIG_WIFI_ESP_AT_DNS_USE=y

# The following is needed for zsock_recvfrom to function properly, otherwise DNS lookup will fail
CONFIG_WIFI_ESP_AT_CIPDINFO_USE=y

#CONFIG_WIFI_LOG_LEVEL_DBG=y
#CONFIG_MODEM_LOG_LEVEL_DBG=y
#CONFIG_MODEM_CONTEXT_VERBOSE_DEBUG=y

CONFIG_TEST_RANDOM_GENERATOR=y

# Need this when storage is on flash
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Need this when storage is on MX25R64
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_NORDIC_QSPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

#CONFIG_PM_DEVICE=y
CONFIG_ARM_MPU=y

#CONFIG_SENSOR=y
CONFIG_GPIO=y
CONFIG_I2C=y
